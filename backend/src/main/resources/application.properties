# Server Configuration
server.port=8080
spring.application.name=clinic-center-backend

# Database Configuration (H2 for demo)
spring.datasource.url=jdbc:h2:mem:clinicdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

frontend.url= ${FRONTEND_URL:http://localhost:3000}
# CORS Configuration
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000},${BACKEND_URL:http://localhost:8080}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Mail (for notification emails) – set env vars or use application-local.properties
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

frontend.url=${FRONTEND_URL:http://localhost:3000}
backend.url=${BACKEND_URL:http://localhost:3000}


# Notification - Email
notification.email.from=${NOTIFICATION_EMAIL_FROM:no-reply@clinic.com}
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
# Clinic (server) email – receives copy of every new appointment
notification.email.clinic-to=${NOTIFICATION_CLINIC_EMAIL:jegot12181@gmail.com}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
